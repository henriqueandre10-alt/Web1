<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
</head>
<body>
    <div id="container">
        <header>
            <div id="logo">
                <i class="material-icons"></i>
            </div>
        </header>
        <div id="col">
            <label for="iptNome">Nome:</label>
            <input id="iptNome" type="text">
            <br><br>
            <label for="iptIdade">Idade:</label>
            <input id="iptIdade" type="number">
            <br><br>
            <label for="iptCurso">Curso:</label>
            <input id="iptCurso" type="text">
            <br><br>
            <label for="iptMarca">Marca:</label>
            <input id="iptMarca" type="text">
            <br><br>
            <label for="iptSolicitacao">Solicitações:</label>
            <input id="iptSolicitacao" type="text">
            <br><br>
            <textarea name="status" rows="10" cols="120" placeholder="Status"></textarea>
        </div>
        <footer>
            <ul>
                <li><i class="material-icons">search</i></li>
                <li><i class="material-icons">add</i></li>
                <li><i class="material-icons">person</i></li>
                <li><i class="material-icons">info</i></li>
            </ul>
        </footer>
    </div>
</body>
</html>
